          - generic [ref=e86]:
            - paragraph [ref=e87]: "The Pomodoro Technique is one of the most widely adopted productivity systems in the world. Developed by Francesco Cirillo in the late 1980s, it transforms overwhelming workloads into manageable sprints by dividing work into 25-minute focus blocks separated by 5-minute breaks. This timer implements the full Pomodoro cycle: four work sessions with short breaks, designed to keep you focused and refreshed throughout your work day."
            - heading "How the Pomodoro Timer Works" [level=2] [ref=e88]
            - paragraph [ref=e89]: Each Pomodoro cycle consists of four rounds. In each round, you work for 25 minutes with full concentration on a single task, then rest for 5 minutes. After completing all four rounds (approximately 2 hours), you take a longer break of 15–30 minutes. This rhythm aligns with the brain's natural attention cycles — research shows that focused attention typically peaks around 20–30 minutes before declining.
            - paragraph [ref=e90]: "The timer does three things that willpower alone cannot: it creates a clear starting signal (removing the friction of \"when should I start?\"), it provides a visible progress indicator (you always know how much focus time remains), and it enforces breaks (preventing the burnout that comes from pushing through fatigue)."
            - heading "Why Pomodoro Works" [level=2] [ref=e91]
            - heading "It defeats procrastination" [level=3] [ref=e92]
            - paragraph [ref=e93]: Committing to "just 25 minutes" is psychologically easier than committing to "finish the project." The small scope lowers the activation energy needed to start, and once you are working, momentum carries you forward. Many people who procrastinate for hours find they can start immediately when the commitment is a single pomodoro.
            - heading "It prevents burnout" [level=3] [ref=e94]
            - paragraph [ref=e95]: Mandatory breaks are not a luxury — they are a performance strategy. Your prefrontal cortex (the brain region responsible for focus and decision-making) depletes glucose during intense mental work. The 5-minute break allows partial recovery, so each subsequent work block starts closer to full capacity.
            - heading "It improves time awareness" [level=3] [ref=e96]
            - paragraph [ref=e97]: Tracking how many pomodoros a task requires teaches you how long things actually take versus how long you think they take. Over time, this improves planning accuracy and helps you make realistic commitments. Many Pomodoro practitioners report that their estimation skills improve dramatically within a few weeks.
            - heading "Tips for Effective Pomodoro Sessions" [level=2] [ref=e98]
            - list [ref=e99]:
              - listitem [ref=e100]:
                - strong [ref=e101]: "Choose one task per pomodoro:"
                - text: Multitasking within a 25-minute block defeats the purpose. Pick the most important thing and do only that.
              - listitem [ref=e102]:
                - strong [ref=e103]: "Write down distractions:"
                - text: When a thought or urge interrupts you (check email, look something up), write it on a notepad and return to your task. Handle the distraction during your break.
              - listitem [ref=e104]:
                - strong [ref=e105]: "Protect the pomodoro:"
                - text: Treat a running timer as sacred. If someone interrupts, tell them you will be available in X minutes. If you must stop, the pomodoro does not count — start a fresh one when you resume.
              - listitem [ref=e106]:
                - strong [ref=e107]: "Track your count:"
                - text: Keep a daily tally of completed pomodoros. Seeing the number grow provides motivation and data for improving your work habits.
              - listitem [ref=e108]:
                - strong [ref=e109]: "Physically move during breaks:"
                - text: Stand, stretch, walk. Physical movement during breaks accelerates cognitive recovery more than passive rest.
              - listitem [ref=e110]:
                - strong [ref=e111]: "Adjust the timing:"
                - text: If 25 minutes feels too long or too short, experiment with 20 or 30-minute blocks. The structure matters more than the exact duration.
            - heading "Who Benefits from Pomodoro" [level=2] [ref=e112]
            - paragraph [ref=e113]: Students preparing for exams, writers battling blank-page anxiety, programmers tackling complex codebases, freelancers managing their own schedules, and anyone with ADHD who struggles with time blindness. The external structure replaces the need for internal motivation, making productive work accessible even on days when willpower is low.
