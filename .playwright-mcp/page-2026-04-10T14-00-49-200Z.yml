      - heading "The Complete Guide to the Pomodoro Technique" [level=1] [ref=e53]
    - article [ref=e55]:
      - figure "The humble tomato timer that launched a global productivity movement." [ref=e56]:
        - img "The Pomodoro Technique — a kitchen timer next to a focused workspace" [ref=e57]
        - generic [ref=e58]: The humble tomato timer that launched a global productivity movement.
      - paragraph [ref=e59]: You've probably heard of the Pomodoro Technique. Maybe you've tried it. Maybe you bounced off it after a day because "25 minutes felt too short" or "the breaks ruined your flow."
      - paragraph [ref=e60]: "Here's the thing: most Pomodoro guides are written by SaaS companies trying to sell you a $15/month subscription. They give you the Wikipedia version, slap a signup form at the bottom, and call it a day."
      - paragraph [ref=e61]:
        - text: This guide is different. We built an actual
        - link "free Pomodoro timer" [ref=e62] [cursor=pointer]:
          - /url: /pomodoro-timer
        - text: — no account required, no upsells — and we've watched thousands of people use it. Here's what actually works.
      - separator [ref=e63]
      - heading "What Is the Pomodoro Technique?" [level=2] [ref=e64]
      - paragraph [ref=e65]: The Pomodoro Technique is a time management method created by Francesco Cirillo in the late 1980s. He used a tomato-shaped kitchen timer (pomodoro is Italian for tomato), and the name stuck.
      - paragraph [ref=e66]: "The core idea is dead simple:"
      - list [ref=e67]:
        - listitem [ref=e68]:
          - strong [ref=e69]: Pick a task
          - text: you want to work on
        - listitem [ref=e70]:
          - strong [ref=e71]: Set a timer
          - text: for 25 minutes
        - listitem [ref=e72]:
          - strong [ref=e73]: Work on that one task
          - text: until the timer rings
        - listitem [ref=e74]:
          - strong [ref=e75]: Take a 5-minute break
        - listitem [ref=e76]:
          - strong [ref=e77]: Repeat.
          - text: After 4 rounds, take a longer 15–30 minute break
      - paragraph [ref=e78]: That's it. No app required. No certification. No course.
      - figure "The classic Pomodoro cycle. Simple, but the magic is in the consistency." [ref=e79]:
        - 'img "Diagram showing the Pomodoro cycle: 25 min work, 5 min break, repeat 4 times, then 15-30 min long break" [ref=e80]'
        - generic [ref=e81]: The classic Pomodoro cycle. Simple, but the magic is in the consistency.
      - heading "Why It Works (the Science)" [level=3] [ref=e82]
      - paragraph [ref=e83]: "The technique works because it leverages three well-documented cognitive principles:"
      - paragraph [ref=e84]:
        - strong [ref=e85]: Timeboxing creates urgency.
        - text: Parkinson's Law says work expands to fill the time available. A 25-minute box forces you to start, even when you don't feel like it. The timer isn't a suggestion — it's a deadline.
      - paragraph [ref=e86]:
        - strong [ref=e87]: Breaks prevent decision fatigue.
        - text: Your prefrontal cortex — the part of your brain responsible for focus, planning, and willpower — gets depleted over time. Short breaks allow partial recovery. Without them, you hit diminishing returns around the 45-minute mark.
      - paragraph [ref=e88]:
        - strong [ref=e89]: Single-tasking beats multitasking.
        - text: Research from Stanford shows that chronic multitaskers perform worse on every metric — including the tasks they think they're good at. The Pomodoro Technique forces you to commit to one thing at a time.
      - generic [ref=e90]:
        - img "Tip" [ref=e91]
        - paragraph [ref=e94]: The Pomodoro Technique isn't about becoming a productivity robot. It's about creating a sustainable rhythm that protects your focus while respecting your brain's natural limits.
      - separator [ref=e95]
      - heading "How to Actually Do It (Step by Step)" [level=2] [ref=e96]
      - paragraph [ref=e97]: Most guides give you the 5 steps above and stop. Here's what they leave out.
      - 'heading "Step 1: Write Down Your Task Before Starting the Timer" [level=3] [ref=e98]'
      - paragraph [ref=e99]:
        - text: Don't just think about what you're going to do.
        - strong [ref=e100]: Write it down.
        - text: "Physically. On paper, in a notes app, wherever. Be specific:"
      - list [ref=e101]:
        - listitem [ref=e102]: "Bad: \"Work on report\""
        - listitem [ref=e103]: "Good: \"Write the methodology section of Q2 report\""
      - paragraph [ref=e104]: This tiny act of writing activates a different part of your brain and dramatically increases follow-through.
      - 'heading "Step 2: Set Your Timer" [level=3] [ref=e105]'
      - paragraph [ref=e106]: "Use a real timer — not your phone's clock app buried under notifications. A dedicated timer matters because:"
      - list [ref=e107]:
        - listitem [ref=e108]: It's always visible (ambient awareness of time)
        - listitem [ref=e109]: It doesn't tempt you with Instagram
        - listitem [ref=e110]: Starting it feels like a physical commitment
      - generic [ref=e111]:
        - img [ref=e113]
        - generic [ref=e116]:
          - paragraph [ref=e117]: Pomodoro Timer
          - paragraph [ref=e118]: Free online timer — no signup required
        - link "Try the Pomodoro timer →" [ref=e119] [cursor=pointer]:
          - /url: /pomodoro-timer
      - 'heading "Step 3: Work Until the Timer Rings" [level=3] [ref=e120]'
      - paragraph [ref=e121]: "When the timer is running:"
      - list [ref=e122]:
        - listitem [ref=e123]:
          - strong [ref=e124]: No email.
          - text: No Slack. No "quick check."
        - listitem [ref=e125]:
          - text: If a thought pops up ("I need to reply to that email"), write it on a piece of paper and get back to work. Cirillo calls this the
          - strong [ref=e126]: "\"Inform, Negotiate, Call Back\""
          - text: strategy.
        - listitem [ref=e127]: "If someone interrupts you, say: \"I'm in the middle of something. Can I get back to you in 15 minutes?\" Most things can wait 15 minutes."
      - figure "How to handle interruptions without breaking your Pomodoro." [ref=e128]:
        - 'img "Flowchart showing how to handle interruptions during a Pomodoro: internal (write it down) vs external (negotiate delay)" [ref=e129]'
        - generic [ref=e130]: How to handle interruptions without breaking your Pomodoro.
      - 'heading "Step 4: Take Your Break (Actually Take It)" [level=3] [ref=e131]'
      - paragraph [ref=e132]: This is where most people fail. They finish a Pomodoro and think "I'm in the zone, I'll skip the break."
      - paragraph [ref=e133]:
        - strong [ref=e134]: Don't skip the break.
        - text: "The break is not a reward — it's a necessary part of the system. During your 5-minute break:"
      - list [ref=e135]:
        - listitem [ref=e136]: Stand up and stretch
        - listitem [ref=e137]: Get water or coffee
        - listitem [ref=e138]: "Look out a window (the 20-20-20 rule: every 20 minutes, look at something 20 feet away for 20 seconds)"
        - listitem [ref=e139]:
          - strong [ref=e140]: Don't
          - text: check social media — it's not restful, it's stimulating
      - 'heading "Step 5: Track Your Pomodoros" [level=3] [ref=e141]'
      - paragraph [ref=e142]: "At the end of each day, count how many Pomodoros you completed. This gives you:"
      - list [ref=e143]:
        - listitem [ref=e144]: A realistic sense of your daily capacity (most people can do 8–12 focused Pomodoros per day)
        - listitem [ref=e145]: Data to plan future work ("this project will take about 16 Pomodoros")
        - listitem [ref=e146]: Motivation through visible progress
      - separator [ref=e147]
      - heading "Which Interval Is Right for You?" [level=2] [ref=e148]
      - paragraph [ref=e149]:
        - text: "Here's what nobody tells you:"
        - strong [ref=e150]: 25 minutes is a starting point, not a commandment.
      - paragraph [ref=e151]: "Different work types and different brains respond to different intervals. Use this guide to find your sweet spot:"
      - figure "There's no single 'correct' interval. Match the interval to your work type." [ref=e152]:
        - 'img "Comparison table of different Pomodoro intervals: 15/3, 25/5, 50/10, and 90/20 minute work/break ratios" [ref=e153]'
        - generic [ref=e154]: There's no single 'correct' interval. Match the interval to your work type.
      - 'heading "The Classic: 25 / 5" [level=3] [ref=e155]'
      - paragraph [ref=e156]:
        - strong [ref=e157]: "Best for:"
        - text: General knowledge work, email processing, writing first drafts, studying
      - paragraph [ref=e158]:
        - strong [ref=e159]: "Why it works:"
        - text: Short enough to not feel daunting. Long enough to make meaningful progress. The 5-minute break prevents the "I'll just keep going" trap.
      - paragraph [ref=e160]:
        - strong [ref=e161]: "Try this if:"
        - text: You're new to the technique, you struggle with procrastination, or your work involves lots of task-switching.
      - 'heading "The Short Sprint: 15 / 3" [level=3] [ref=e162]'
      - paragraph [ref=e163]:
        - strong [ref=e164]: "Best for:"
        - text: Tedious tasks you've been avoiding, ADHD-friendly work sessions, high-anxiety tasks
      - paragraph [ref=e165]:
        - strong [ref=e166]: "Why it works:"
        - text: The activation energy to start a 15-minute task is almost zero. "I can do anything for 15 minutes" is a powerful mental trick.
      - paragraph [ref=e167]:
        - strong [ref=e168]: "Try this if:"
        - text: You're dealing with executive function challenges, or you have a task you've been putting off for days.
      - 'heading "The Deep Worker: 50 / 10" [level=3] [ref=e169]'
      - paragraph [ref=e170]:
        - strong [ref=e171]: "Best for:"
        - text: Programming, design work, long-form writing, complex analysis
      - paragraph [ref=e172]:
        - strong [ref=e173]: "Why it works:"
        - text: Creative and analytical work often requires 10–15 minutes just to load context into your brain. A 25-minute Pomodoro gives you only 10–15 minutes of actual deep work. Doubling the interval gives you a proper runway.
      - paragraph [ref=e174]:
        - strong [ref=e175]: "Try this if:"
        - text: You consistently feel like 25 minutes cuts you off right when you're getting productive.
      - 'heading "The Ultramarathon: 90 / 20" [level=3] [ref=e176]'
      - paragraph [ref=e177]:
        - strong [ref=e178]: "Best for:"
        - text: Research sessions, creative projects, flow-state work
      - paragraph [ref=e179]:
        - strong [ref=e180]: "Why it works:"
        - text: This aligns with the body's ultradian rhythm — the natural 90-minute cycle of high and low alertness. It's not technically Pomodoro anymore, but the principle is the same.
      - paragraph [ref=e181]:
        - strong [ref=e182]: "Try this if:"
        - text: You're experienced with focus techniques and your work genuinely benefits from extended uninterrupted time.
      - generic [ref=e183]:
        - img "Info" [ref=e184]
        - paragraph [ref=e187]: Not sure which interval to pick? Start with 25/5 for one week. If you consistently feel interrupted by the timer, move to 50/10. If 25 minutes feels too long, try 15/3. Let your experience guide you, not theory.
