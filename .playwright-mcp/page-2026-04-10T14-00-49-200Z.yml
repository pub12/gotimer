    - generic [ref=e314]:
      - heading "Frequently Asked Questions" [level=2] [ref=e317]
      - generic [ref=e318]:
        - generic [ref=e319]:
          - term [ref=e320]: What is the Pomodoro Technique?
          - definition [ref=e321]: The Pomodoro Technique is a time management method where you work in focused 25-minute intervals (called Pomodoros) separated by 5-minute breaks. After completing 4 Pomodoros, you take a longer 15-30 minute break. It was created by Francesco Cirillo in the late 1980s and is named after the tomato-shaped kitchen timer he used.
        - generic [ref=e322]:
          - term [ref=e323]: How long is a Pomodoro session?
          - definition [ref=e324]: "A classic Pomodoro session is 25 minutes of focused work followed by a 5-minute break. However, you can adjust the intervals to suit your work type: 15/3 for short sprints, 50/10 for deep work like programming, or 90/20 for extended creative sessions."
        - generic [ref=e325]:
          - term [ref=e326]: Does the Pomodoro Technique actually work?
          - definition [ref=e327]: Yes, research supports the principles behind it. Timeboxing creates urgency (Parkinson's Law), regular breaks prevent cognitive fatigue, and single-tasking outperforms multitasking according to Stanford research. Most people can sustain 8-12 focused Pomodoros per day.
        - generic [ref=e328]:
          - term [ref=e329]: What should I do during Pomodoro breaks?
          - definition [ref=e330]: During your 5-minute breaks, stand up and stretch, get water, or look away from your screen (the 20-20-20 rule). Avoid checking social media or email — these are stimulating, not restful. During longer 15-30 minute breaks, take a walk, eat a snack, or do a non-screen activity.
        - generic [ref=e331]:
          - term [ref=e332]: Can I change the 25-minute Pomodoro interval?
          - definition [ref=e333]: Absolutely. The 25-minute interval is a starting point, not a rule. Try 15-minute intervals if you struggle with procrastination or have ADHD, 50-minute intervals for deep work like programming or writing, or 90-minute intervals to match your body's natural ultradian rhythm.
        - generic [ref=e334]:
          - term [ref=e335]: What if I get interrupted during a Pomodoro?
          - definition [ref=e336]: "For internal interruptions (your own thoughts), write them down on paper and return to your task. For external interruptions, use the 'Inform, Negotiate, Call Back' strategy: tell the person you're in the middle of something and ask if you can get back to them in 15 minutes. If the interruption can't wait, void the Pomodoro and start a new one."
        - generic [ref=e337]:
          - term [ref=e338]: Is the Pomodoro Technique good for studying?
          - definition [ref=e339]: The Pomodoro Technique is extremely effective for studying. It naturally creates spaced repetition when you rotate subjects across Pomodoros, and tracking Pomodoros gives you concrete data ('12 Pomodoros across 4 subjects') instead of vague time estimates ('I studied for 6 hours').
        - generic [ref=e340]:
          - term [ref=e341]: Do I need a special app for the Pomodoro Technique?
          - definition [ref=e342]: No. All you need is a timer and a way to track your completed Pomodoros. A free online timer like GoTimer's Pomodoro Timer combined with a pen and paper is the simplest and most effective setup. Avoid overcomplicating the system with analytics dashboards — simplicity is the point.
