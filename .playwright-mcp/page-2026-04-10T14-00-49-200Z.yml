      - heading "The Case for Pen and Paper" [level=3] [ref=e269]
      - paragraph [ref=e270]: "Some Pomodoro purists insist on analog tools. There's merit to this:"
      - list [ref=e271]:
        - listitem [ref=e272]: The physical act of crossing off a Pomodoro is satisfying
        - listitem [ref=e273]: Paper doesn't have a battery
        - listitem [ref=e274]: Writing engages different neural pathways than typing
      - heading "The Best Approach" [level=3] [ref=e275]
      - paragraph [ref=e276]: Use a digital timer (for accuracy and convenience) with a paper tracking sheet (for engagement and satisfaction). Best of both worlds.
