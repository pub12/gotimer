      - heading "The Pomodoro Technique for Different Professions" [level=2] [ref=e223]
      - heading "For Students" [level=3] [ref=e224]
      - paragraph [ref=e225]: "The Pomodoro Technique is almost unfairly effective for studying. Here's why:"
      - list [ref=e226]:
        - listitem [ref=e227]:
          - strong [ref=e228]: Spaced repetition + Pomodoros = superpower.
          - text: Study one subject for 4 Pomodoros, switch to another, then come back. The breaks create natural spacing.
        - listitem [ref=e229]:
          - strong [ref=e230]: "Exam prep:"
          - text: Use each Pomodoro for a different topic. Track how many Pomodoros each subject needs. This replaces vague "I studied for 6 hours" with concrete "I did 12 Pomodoros across 4 subjects."
      - heading "For Programmers" [level=3] [ref=e231]
      - paragraph [ref=e232]: "Programming has a unique challenge: deep context loading. You need 10–15 minutes just to hold a complex system in your head."
      - list [ref=e233]:
        - listitem [ref=e234]:
          - text: Use
          - strong [ref=e235]: 50/10 intervals
          - text: for coding
        - listitem [ref=e236]:
          - text: Use
          - strong [ref=e237]: 25/5 intervals
          - text: for code review, documentation, and bug triage
        - listitem [ref=e238]: During breaks, stand up. Seriously. Programmers who sit for 8 hours straight are not heroic — they're damaging their bodies.
      - heading "For Writers" [level=3] [ref=e239]
      - paragraph [ref=e240]: "Writing and the Pomodoro Technique are a natural fit:"
      - list [ref=e241]:
        - listitem [ref=e242]:
          - strong [ref=e243]: "First drafts:"
          - text: 25/5. Don't edit, just write. The timer gives you permission to be imperfect.
        - listitem [ref=e244]:
          - strong [ref=e245]: "Editing:"
          - text: 50/10. Editing requires more sustained attention to catch inconsistencies.
        - listitem [ref=e246]:
          - strong [ref=e247]: "Research:"
          - text: 25/5 with strict rules about not falling down rabbit holes. When you find something interesting but tangential, write it on your interruption list and keep going.
      - heading "For Remote Workers" [level=3] [ref=e248]
      - paragraph [ref=e249]:
        - text: "If you work from home, the Pomodoro Technique solves one of the biggest remote work problems:"
        - strong [ref=e250]: the blurred boundary between work and not-work.
      - list [ref=e251]:
        - listitem [ref=e252]: Pomodoros give you a clear "I'm working now" signal
        - listitem [ref=e253]: Breaks give you guilt-free moments to throw in laundry, pet the dog, etc.
        - listitem [ref=e254]: Tracking Pomodoros helps answer "what did I even do today?"
      - separator [ref=e255]
