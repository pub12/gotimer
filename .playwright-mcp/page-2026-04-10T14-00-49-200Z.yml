      - heading "Common Mistakes (and How to Fix Them)" [level=2] [ref=e198]
      - 'heading "Mistake 1: Treating the Timer as the Enemy" [level=3] [ref=e199]'
      - paragraph [ref=e200]:
        - text: If you're constantly watching the clock and feeling stressed, you're doing it wrong. The timer is a
        - strong [ref=e201]: container
        - text: ", not a cage. If 25 minutes feels oppressive, shorten it. The point is to create rhythm, not anxiety."
      - 'heading "Mistake 2: Working Through Breaks" [level=3] [ref=e202]'
      - paragraph [ref=e203]:
        - text: We covered this above, but it bears repeating.
        - strong [ref=e204]: Skipping breaks doesn't make you more productive.
        - text: It makes you less productive, slower, and more error-prone after about 90 minutes.
      - 'heading "Mistake 3: Using It for Everything" [level=3] [ref=e205]'
      - paragraph [ref=e206]: "The Pomodoro Technique is not ideal for:"
      - list [ref=e207]:
        - listitem [ref=e208]: Meetings (you can't pause a conversation)
        - listitem [ref=e209]: Creative brainstorming sessions (sometimes you need to follow a thread)
        - listitem [ref=e210]: Tasks that take less than 5 minutes (just do them)
      - paragraph [ref=e211]: Use it for focused, individual work. Don't force it where it doesn't fit.
      - 'heading "Mistake 4: Overcomplicating the System" [level=3] [ref=e212]'
      - paragraph [ref=e213]: "You don't need:"
      - list [ref=e214]:
        - listitem [ref=e215]: A special app with analytics dashboards
        - listitem [ref=e216]: A color-coded task categorization system
        - listitem [ref=e217]: A review process for your Pomodoro data
      - paragraph [ref=e218]: A timer and a piece of paper. That's the system. Everything else is procrastination disguised as productivity.
