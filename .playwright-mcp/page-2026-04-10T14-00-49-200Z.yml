      - heading "Frequently Asked Questions" [level=2] [ref=e287]
      - paragraph [ref=e288]: "These are covered in the FAQ section below, but here are quick answers to the most common questions:"
      - paragraph [ref=e289]:
        - strong [ref=e290]: "\"What if my task takes more than one Pomodoro?\""
        - text: Good — most meaningful work does. Just keep going with fresh Pomodoros. The boundary between Pomodoros is a checkpoint, not a stop sign.
      - paragraph [ref=e291]:
        - strong [ref=e292]: "\"What if I finish my task before the timer ends?\""
        - text: Use the remaining time for review, cleanup, or preparation for the next task. Don't start a new task mid-Pomodoro.
      - paragraph [ref=e293]:
        - strong [ref=e294]: "\"Does the Pomodoro Technique work with ADHD?\""
        - text: Many people with ADHD find shorter intervals (15/3) extremely helpful. The external timer provides structure that internal motivation can't. However, it's not a substitute for professional treatment.
      - paragraph [ref=e295]:
        - strong [ref=e296]: "\"Can I use the Pomodoro Technique in an open office?\""
        - text: Yes, but you'll need to set expectations with colleagues. A visible timer or a "do not disturb" sign helps. Noise-canceling headphones are your friend.
      - separator [ref=e297]
      - heading "Start Your First Pomodoro Now" [level=2] [ref=e298]
      - paragraph [ref=e299]:
        - text: "You've read the guide. You know the theory. Now do the only thing that matters:"
        - strong [ref=e300]: start a timer and work for 25 minutes.
      - paragraph [ref=e301]: Don't optimize your system first. Don't download an app. Don't watch a YouTube video about it. Just start.
